# Generic minimal RX888-wsprdaemon config

[global]
hardware = rx888 # use built-in rx888 driver, configured in [rx888]
status = kph-1-hf-status.local       # DNS name for receiver status and commands
data = kph-1-hf-data.local
samprate = 12000        # default output sample rate
mode = usb 		# default receive mode
# rest are defaults
ttl = 1                  ### 3/16/26 AI6VN - The RX888 attached to KPH2 has failed, so it needs to get its streams from this server
#ttl = 0                 # Too many WD sites don't have IGMP aware ethernet swtiches, so don't send radiod multicast packets out the ethernet port.
#fft-threads = 1
#iface = enp1s0

[rx888]
device = "rx888" # required so it won't be seen as a demod section
description = "KPH-1 RX888 fed by TCI-530" # good to put callsign and antenna description in here
# gain = 0 # dB
# rest are defaults
samprate = 129600000       # Hz
#samprate =   64800000     # If a server doesn't have enough CPU power, then run at this rate.  But a 30 MHz lowpass filter is required

# 2/4/26 Rob - uncomment the following two lines and replug/power cycle the RX888 to load the 20 second watchdog firmware
# 2026-05-27 disabled: ka9q-radio 1.1.0+ loads firmware via rx888_boot.service (udev-triggered).
# Leaving this enabled made radiod race rx888_boot writing firmware to 04b4:00f3 -> LIBUSB_ERROR_IO,
# device dropped off USB and never re-enumerated as 04b4:00f1.
#firmware = 20s_watchdog.img
#hack_no_usb_reset = yes   # no longer supported - 5/17/2026 KA9Q

[WSPR]
# Bottom of 200 Hz WSPR segments on each band. Center is 1500 Hz higher
# sample rate must be 12 kHz as required by wsprd
disable = no
encoding = float
data = kph-1-wspr-pcm.local
agc = 0
gain = 0
samprate = 12000
mode = usb
low = 1300
high = 1700
# 2026-02-16 N5TNL: add BPSK sync channel to WSPR list
freq = "136k000 474k200 1m836600 3m568600 3m592600 5m287200 5m364700 7m038600 10m138700 13m553900 14m095600 18m104600 21m094600 24m924600 28m124600 40m680000 50m293000 45m375"

[FT8-old]
